<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entertainment Studio - Sign up</title>
    <link rel="icon" type="image/svg+xml" href="../img/AyuVerse-Icon.svg" />
    <link rel="stylesheet" href="../css/signup.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main class="Sign_up">
      <form action="Home.html">
        <div class="signup">
          <h2>Sign Up</h2>
          <div class="name" id="user-up">
            <i class="fa-solid fa-circle-user"></i>
            <input
              id="name"
              autocomplete="off"
              type="text"
              name="username"
              placeholder="Name"
              required
              style="text-transform: capitalize"
            />
          </div>
          <div class="E-mail" id="user-up">
            <i class="fa-solid fa-envelope-open"></i>
            <input
              id="email"
              autocomplete="off"
              type="E-mail"
              name="email"
              placeholder="E-mail"
              required
            />
          </div>
          <div class="Password" id="user-up">
            <i class="fa-solid fa-lock"></i>
            <input
              id="password"
              autocomplete="off"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
          </div>
          <div class="create_button">
            <button type="submit" id="btn">Create Account</button>
          </div>
          <p>Already have an account? <a href="/">Sign in</a></p>
        </div>
      </form>
      <!-- Popup msg Bootstrap-->
      <div
        class="toast align-items-center text-bg-primary border-0"
        id="toastMsg"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div id="toastText" class="toast-body">Hello, world! This is a toast message.</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </main>
    <script src="../js/popup.js"></script>
    <script src="../js/signup.js"></script>
  </body>
</html>
