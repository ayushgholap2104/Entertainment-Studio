<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertainment Studio - OTP Verification</title>
  <link rel="icon" type="image/svg+xml" href="../img/AyuVerse-Icon.svg">
  <link rel="stylesheet" href="../css/verify.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="js/project.js"></script>
</head>
<body>
  <main class="verify_cont">
    <form action="Home.html">
      <div class ='verify_interface'>
        <div class="verify_icon">
          <i class="fa-solid fa-lock" style="color: rgb(177, 151, 252);"></i>
        </div>
        <div class="verify_head">
          <h2>Account Verification</h2>
          <p>Enter Verify Code Below</p>
        </div>
        <div class="otp_code">
          <input type="text" maxlength="1" class="otp_input" id="otp_input1">
          <input type="text" maxlength="1" class="otp_input" id="otp_input2">
          <input type="text" maxlength="1" class="otp_input" id="otp_input3">
          <input type="text" maxlength="1" class="otp_input" id="otp_input4">
          <input type="text" maxlength="1" class="otp_input" id="otp_input5">
          <input type="text" maxlength="1" class="otp_input" id="otp_input6">
        </div>
        <div class="resend_code">
          <a href="verify.html">Resend Code</a>
        </div>
        <div class="verify_code">
          <button type="submit" id="verify_btn">Verify Code</button>
        </div>
      </div>
    </form>
  </main>
  <script src="../js/verify.js"></script>
</body>
</html>
